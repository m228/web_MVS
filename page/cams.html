<!DOCTYPE html>
<html lang="ru">
<body>
    <h1>Камеры</h1>

    <button onclick="location.href='/'">Главная</button>

    <table style="border-collapse: collapse;">
        <thead>
            <tr>
                <th style="border: 1px solid black;">Камеры (серийник)</th>
                <th style="border: 1px solid black;">Статусы</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

    <script>
        async function loadCams() {
            const response = await fetch('/api/cams');
            const data = await response.json();

            const table = document.getElementById('table');
            table.innerHTML = '';

            for (const serial in data) {
                table.innerHTML += `
                    <tr>
                        <td style="border: 1px solid black;">${serial}</td>
                        <td style="border: 1px solid black;">${data[serial]}</td>
                        <td style="padding-left: 10px;">
                            <button onclick="openCam('${serial}')">▶</button>
                        </td>
                    </tr>
                `;
            }
        }
        async function openCam(serial) {
            const response = await fetch(`/api/ip?serial_number=${encodeURIComponent(serial)}`);
            const data = await response.json();
            alert(data.ip);
        }

        loadCams();
    </script>
</body>
</html>
