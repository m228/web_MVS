<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройка камеры</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="menu-item">Главная</a>
      <a href="/cams" class="menu-item">Камеры</a>
      <a href="/camera" class="menu-item active">Настройки</a>
    </aside>

    <main class="content">
      <h1>Настройка камеры</h1>
      <p>Серийный номер: <span id="cameraSerial"></span></p>

      <div class="camera-layout" id="cameraLayout">
        <div class="camera-main">
          <div class="camera-toolbar card">

            <button type="button" id="startStream" class="toolbar-btn" title="Запустить поток">
              <img src="/static/icon/start.png" alt="Запустить поток" class="toolbar-img">
            </button>

            <button type="button" id="applyBtn" class="toolbar-btn hidden" title="Применить">
              <img src="/static/icon/submit.png" alt="Применить" class="toolbar-img">
            </button>

            <button type="button" id="stopStream" class="toolbar-btn hidden" title="Остановить поток">
              <img src="/static/icon/stop.png" alt="Остановить поток" class="toolbar-img">
            </button>

            <button type="button" id="SavePhoto" class="toolbar-btn" title="Сохранение фото">
               <img src="/static/icon/photo.png" alt="Сохранение фото" class="toolbar-img">
            </button>

            <button type="button" id="SaveVideo" class="toolbar-btn" title="Сохранение видео">
               <img src="/static/icon/video.png" alt="ОСохранение видео" class="toolbar-img">
            </button>
          </div>

          <div class="camera-screen card">
            <img
              id="cameraFrame"
              alt="Кадр камеры"
              class="camera-frame"
            />
            <div id="cameraPlaceholder" class="camera-placeholder">
              NO VIDEO
            </div>
          </div>

          <div class="camera-bottom">
            <div class="card">
              <h2>Запись видео</h2>
              <div class="record-form">
                <label>
                  Записывать видео
                  <select name="record_video">
                    <option value="off">Выключено</option>
                    <option value="on">Включено</option>
                  </select>
                </label>

                <label>
                  Длительность записи (мин)
                  <input type="number" name="video_minutes" value="10" min="1" />
                </label>

                <div class="record-actions">
                  <button type="button">Начать запись</button>
                  <button type="button">Остановить запись</button>
                </div>
              </div>
            </div>

            <div class="card">
              <h2>Фото</h2>
              <div class="record-form">
                <label>
                  Делать фото каждые (мин)
                  <input type="number" name="photo_interval" value="5" min="1" />
                </label>

                <label>
                  Имя папки / сессии
                  <input type="text" name="session_name" placeholder="Например: camera_01" />
                </label>

                <div class="record-actions">
                  <button type="button">Сделать фото</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="camera-sidebar" id="cameraSidebar">
          <div class="card">
            <div class="camera-sidebar-header">
              <h2>Параметры камеры</h2>
            </div>



            <form id="settingsForm">
              <label>
                Width
                <input type="number" name="width" value="2448" />
              </label>

              <label>
                Height
                <input type="number" name="height" value="2048" />
              </label>

              <label>
                OffsetX
                <input type="number" name="offset_x" value="0" />
              </label>

              <label>
                OffsetY
                <input type="number" name="offset_y" value="0" />
              </label>

              <label>
                FPS
                <input type="number" step="0.1" name="fps" value="1" />
              </label>

              <label>
                Exposure auto
                <select name="exposure_auto">
                  <option value="Off" selected>Off</option>
                  <option value="Once">Once</option>
                  <option value="Continuous">Continuous</option>
                </select>
              </label>

              <label>
                Exposure time
                <input type="number" step="1" name="exposure_time" />
              </label>
            </form>
          </div>
        </aside>
      </div>

      <script src="/static/main.js"></script>
    </main>
  </div>
</body>
</html>
