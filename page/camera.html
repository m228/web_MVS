<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройка камеры</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="menu-item">Главная</a>
      <a href="/cams" class="menu-item">Камеры</a>
      <a href="/camera" class="menu-item active">Настройки</a>
    </aside>

    <main class="content">
      <h1>Настройка камеры</h1>

      <div class="camera-layout">
        <div class="camera-main">
          <div class="camera-screen"></div>

          <div class="camera-bottom">
            <div class="card">
              <h2>Запись видео</h2>
              <div class="record-form">
                <label>
                  Записывать видео
                  <select name="record_video">
                    <option value="off">Выключено</option>
                    <option value="on">Включено</option>
                  </select>
                </label>

                <label>
                  Длительность записи (мин)
                  <input type="number" name="video_minutes" value="10" min="1" />
                </label>

                <div class="record-actions">
                  <button type="button">Начать запись</button>
                  <button type="button">Остановить запись</button>
                </div>
              </div>
            </div>

            <div class="card">
              <h2>Фото</h2>
              <div class="record-form">
                <label>
                  Делать фото каждые (мин)
                  <input type="number" name="photo_interval" value="5" min="1" />
                </label>

                <label>
                  Имя папки / сессии
                  <input type="text" name="session_name" placeholder="Например: camera_01" />
                </label>

                <div class="record-actions">
                  <button type="button">Сделать фото</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="camera-sidebar">
          <div class="card">
            <h2>Параметры камеры</h2>

            <form id="settingsForm">
              <label>
                Width
                <input type="number" name="width" value="1300" />
              </label>

              <label>
                Height
                <input type="number" name="height" value="1300" />
              </label>

              <label>
                FPS
                <input type="number" step="0.1" name="fps" value="1" />
              </label>

              <label>
                Exposure auto
                <select name="exposure_auto">
                  <option value="Off">Off</option>
                  <option value="Once">Once</option>
                  <option value="Continuous" selected>Continuous</option>
                </select>
              </label>

              <label>
                Exposure time
                <input type="number" step="1" name="exposure_time" />
              </label>

              <button type="submit">Применить</button>
            </form>
          </div>
        </aside>
      </div>

      <script src="/static/main.js"></script>
    </main>
  </div>
</body>
</html>
