<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройка камеры</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">

    <main class="content">

      <div class="page-header">
        <h1>Настройка камеры</h1>
        <a href="/" class="logo-link">
          <img src="/static/icon/MA-logo.png" alt="Главная" class="logo">
        </a>
      </div>

      <p>Серийный номер: <span id="cameraSerial"></span></p>
      <div class="camera-layout" id="cameraLayout">
        <div class="camera-main">
          <div class="camera-toolbar card">
            <button type="button" id="startBtn" class="toolbar-btn" title="Запустить поток">
              <img src="/static/icon/start.png" alt="Запустить поток" class="toolbar-img">
            </button>

            <button type="button" id="applyBtn" class="toolbar-btn" title="Применить">
              <img src="/static/icon/submit-green.png" alt="Применить" class="toolbar-img grey-btn" id="applyicon">
            </button>

            <button type="button" id="stopBtn" class="toolbar-btn hidden" title="Остановить поток">
              <img src="/static/icon/stop.png" alt="Остановить поток" class="toolbar-img">
            </button>

            <button type="button" id="photoBtn" class="toolbar-btn" title="Сохранение фото">
              <img src="/static/icon/photo.png" alt="Сохранение фото" class="toolbar-img">
              <span class="mode-indicator hidden" id="photoIndicator"></span>
            </button>

            <button type="button" id="videoBtn" class="toolbar-btn" title="Сохранение видео">
              <img src="/static/icon/video.png" alt="Сохранение видео" class="toolbar-img">
              <span class="mode-indicator hidden" id="videoIndicator"></span>
            </button>

            <button type="button" id="networkSettingsBtn" class="toolbar-btn" title="Сетевые настройки">
              <img src="/static/icon/network-settings.png" alt="Сетевые настройки" class="toolbar-img">
            </button>
          </div>

          <div class="camera-screen card">
            <img id="cameraFrame" alt="Кадр камеры" class="camera-frame" />
            <div id="cameraPlaceholder" class="camera-placeholder">
              NO VIDEO
            </div>
          </div>


        </div>

        <aside class="camera-sidebar" id="cameraSidebar">
          <div class="card">
            <div class="camera-sidebar-header">
              <h2>Параметры камеры</h2>
            </div>

            <form id="settingsForm">
              <label class="one-line-label">
                Width (Min: <span id="WidthMax"></span>, Max: <span id="WidthMin"></span>)
              </label>
              <input type="number" name="width" value="2448" />

              <label class="one-line-label">
                Height (Min: <span id="HeightMin"></span>, Max: <span id="HeightMax"></span>)
              </label>
              <input type="number" name="height" value="2048" />

              <label class="one-line-label">
                OffsetX
              </label>
              <input type="number" name="offset_x" value="0" />

              <label class="one-line-label">
                OffsetY
              </label>
              <input type="number" name="offset_y" value="0" />

              <label class="one-line-label">
                FPS (Min: <span id="FpsMin"></span>, Max: <span id="FpsMax"></span>)
              </label>
              <input type="number" step="0.1" name="fps" value="1" />

              <label>
                Exposure auto
                <select name="exposure_auto">
                  <option value="Off" selected>Off</option>
                  <option value="Once">Once</option>
                  <option value="Continuous">Continuous</option>
                </select>
              </label>

              <label class="one-line-label">
                Exposure time (Min: <span id="ExposureMin"></span>, Max: <span id="ExposureMax"></span>)
              </label>
              <input type="number" step="1" name="exposure_time" value="10000" />
            </form>
          </div>
        </aside>
      </div>

      <div class="card photo-card-popup" id="photoCard">
        <h2>Сохранение фото</h2>
        <div class="record-form">
          <label class="one-line-label">
            Интервал (сек)
            <input class="photo-interval-input" type="number" name="photo_interval" value="5" min="1" >
          </label>
          <div class="record-actions">
            <button type="button" id="photoOn">Включить</button>
            <button type="button" id="photoOff">Выключить</button>
          </div>
        </div>
      </div>

      <div class="card video-card-popup" id="videoCard">
        <h2>Запись видео</h2>
        <div class="record-form">
          <label class="video-time-row">
            <span>Длительность записи</span>

            <div class="video-time-controls">
              <input
                class="video-minutes-input"
                type="number"
                name="video_duration"
                value="10"
                min="1"
              >

              <select name="video_duration_unit" class="video-duration-unit">
                <option value="minutes" selected>мин</option>
                <option value="seconds">сек</option>
              </select>
            </div>
          </label>

          <div class="record-actions">
            <button type="button" id="videoOn">Начать запись</button>
            <button type="button" id="videoOff">Остановить запись</button>
          </div>
        </div>
      </div>




      <script src="/static/main.js"></script>
    </main>
  </div>
</body>
</html>
