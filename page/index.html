  <title>Главная</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <main class="content">
      <div class="card">
        <h1>Главная</h1>

        <p>Статус драйвера: <span id="status"></span></p>

      <div class="card" style="margin-top: 20px;">
        <h2>Камеры</h2>

          <thead>
            <tr>
              <th>Камеры (серийник)</th>
              <th>Статусы</th>
              <th>IP-адрес</th>
              <th>Действие</th>
            </tr>
          </thead>
          <tbody id="table"></tbody>
        </table>
      </div>

    </main>
  </div>
    </main>
  </div>
